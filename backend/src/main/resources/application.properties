spring.application.name=dam-monitor-backend

# PostgreSQL is the primary application datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dammonitor}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway Configuration - Database migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=true
spring.flyway.baselineOnMigrate=false
spring.flyway.validateOnMigrate=false

# H2 web console as a JDBC client (connect it to PostgreSQL manually)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Azure Storage Configuration
azure.storage.account-name=${AZURE_STORAGE_ACCOUNT_NAME:}
azure.storage.account-key=${AZURE_STORAGE_ACCOUNT_KEY:}
azure.storage.container-name=${AZURE_STORAGE_CONTAINER_NAME:dam-images}

# Sentinel Hub OAuth2 credentials
sentinel.hub.client-id=${SENTINAL_HUB_CLIENT_ID:}
sentinel.hub.client-secret=${SENTINAL_HUB_CLIENT_SECRET:}

sentinel.hub.token-url=https://services.sentinel-hub.com/oauth/token
sentinel.hub.process-url=https://services.sentinel-hub.com/api/v1/process
sentinel.hub.catalogue-url=https://services.sentinel-hub.com/api/v1/catalog/1.0.0/search

# Multipart file upload configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-post-size=52428800

# Ollama AI Model Configuration (for image validation)
# Default port: 11435 (custom port to avoid conflicts with other services)
# Default model: env-classifier (custom model for environmental issue classification)
# Can be overridden via environment variables: OLLAMA_BASE_URL, OLLAMA_MODEL
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11435}
ollama.model=${OLLAMA_MODEL:env-classifier}