name: Backend Startup Check

on:
  workflow_dispatch:
  push:
    paths:
      - backend/**
      - .github/workflows/test-backend.yaml
  pull_request:
    paths:
      - backend/**
      - .github/workflows/test-backend.yaml

jobs:
  backend-startup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Create temporary backend .env from secrets
        shell: bash
        working-directory: backend
        env:
          AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_STORAGE_ACCOUNT_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
          AZURE_STORAGE_CONTAINER_NAME: ${{ secrets.AZURE_STORAGE_CONTAINER_NAME }}
        run: |
          {
            echo "AZURE_STORAGE_ACCOUNT_NAME=$AZURE_STORAGE_ACCOUNT_NAME"
            echo "AZURE_STORAGE_ACCOUNT_KEY=$AZURE_STORAGE_ACCOUNT_KEY"
            echo "AZURE_STORAGE_CONTAINER_NAME=$AZURE_STORAGE_CONTAINER_NAME"
          } > .env

      - name: Start backend and verify startup
        shell: bash
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw -B spring-boot:run > backend-startup.log 2>&1 &
          APP_PID=$!

          for i in {1..120}; do
            if grep -q "Started DamMonitorBackendApplication" backend-startup.log; then
              echo "Backend started successfully."
              kill "$APP_PID" || true
              wait "$APP_PID" || true
              exit 0
            fi

            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "Backend process exited before startup."
              cat backend-startup.log
              exit 1
            fi

            sleep 1
          done

          echo "Backend did not start within timeout."
          cat backend-startup.log
          kill "$APP_PID" || true
          wait "$APP_PID" || true
          exit 1

      - name: Cleanup temporary backend .env
        if: always()
        shell: bash
        working-directory: backend
        run: rm -f .env
